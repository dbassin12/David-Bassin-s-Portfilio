  <text x="80" y="220" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" letter-spacing="-2">David Bassin</text>
  <text x="80" y="290" fill="#38BDF8" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="600">AI Operations &amp; Enablement</text>
  <line x1="80" y1="320" x2="400" y2="320" stroke="#38BDF8" stroke-width="3" opacity="0.5"/>
  <text x="80" y="380" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="500">"I engineer the guardrails that make AI reliable."</text>
  <!-- Tags -->
  <rect x="80" y="420" width="240" height="40" rx="8" fill="#38BDF8" fill-opacity="0.12" stroke="#38BDF8" stroke-width="1"/>
  <text x="200" y="446" text-anchor="middle" fill="#38BDF8" font-family="system-ui, sans-serif" font-size="18" font-weight="600">Deterministic Workflows</text>
  <rect x="340" y="420" width="180" height="40" rx="8" fill="#38BDF8" fill-opacity="0.12" stroke="#38BDF8" stroke-width="1"/>
  <text x="430" y="446" text-anchor="middle" fill="#38BDF8" font-family="system-ui, sans-serif" font-size="18" font-weight="600">Audit-Ready Outputs</text>
  <rect x="540" y="420" width="220" height="40" rx="8" fill="#38BDF8" fill-opacity="0.12" stroke="#38BDF8" stroke-width="1"/>
  <text x="650" y="446" text-anchor="middle" fill="#38BDF8" font-family="system-ui, sans-serif" font-size="18" font-weight="600">Human-Reviewed Decisions</text>
