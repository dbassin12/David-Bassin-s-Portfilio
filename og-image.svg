  <rect x="0" y="0" width="1200" height="630" fill="url(#og-grad)" opacity="0.5"/>
  <defs>
    <linearGradient id="og-grad" x1="0" y1="0" x2="1200" y2="630">
      <stop stop-color="#0EA5E9" stop-opacity="0.15"/>
